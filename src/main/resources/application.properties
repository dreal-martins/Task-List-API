spring.application.name=taskapp
app.name=Task List App
app.support.email=support@tasklistapp.com

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

resilience4j.ratelimiter.instances.auth.limit-for-period=20
resilience4j.ratelimiter.instances.auth.limit-refresh-period=1s
resilience4j.ratelimiter.instances.auth.timeout-duration=0
resilience4j.ratelimiter.instances.auth.allow-health-indicator-to-fail=true
resilience4j.ratelimiter.instances.auth.subscribe-for-events=true
resilience4j.ratelimiter.instances.auth.event-consumer-buffer-size=50

resilience4j.ratelimiter.instances.tasks.limit-for-period=100
resilience4j.ratelimiter.instances.tasks.limit-refresh-period=1s
resilience4j.ratelimiter.instances.tasks.timeout-duration=0
resilience4j.ratelimiter.instances.tasks.allow-health-indicator-to-fail=true
resilience4j.ratelimiter.instances.tasks.subscribe-for-events=true
resilience4j.ratelimiter.instances.tasks.event-consumer-buffer-size=50